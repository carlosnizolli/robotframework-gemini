name: Feature request
description: Suggest an enhancement for the library
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and the proposed solution. Focus on Robot Framework usage.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What gap does this fill in your suites?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Keyword name, signature, or behavior you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or other tools you tried.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: Text / multimodal oracle (no browser)
        - label: Browser screenshot helpers
        - label: Docs / examples only
        - label: Packaging / CI
